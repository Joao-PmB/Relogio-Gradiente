<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="src/scripts/config.js"></script>
    <script src="src/scripts/script.js" defer></script>
    <title>Relogio Digital</title>
  </head>
  <body>
    <div class="relogio">
      <div>
        <span id="horas">00</span>
        <span class="tempo">Horas</span>
      </div>
      <div>
        <span id="minutos">00</span>
        <span class="tempo">Minutos</span>
      </div>

      <div>
        <span id="segundos">00</span>
        <span class="tempo">Segundos</span>
      </div>
    </div>

    <div class="selecao-horario">
      <select class="form-select form-select-lg mb-3" id="timezones">
        <option value="meuLocal" selected>Seu local</option>
        <option value="America/Sao_Paulo">Brasília</option>
        <option value="America/New_York">Nova York</option>
        <option value="Europe/London">Londres</option>
        <option value="Asia/Tokyo">Tóquio</option>
        <option value="Australia/Sydney">Sydney</option>
      </select>
    </div>
  </body>
</html>
